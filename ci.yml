name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  validate:
    name: Validate v1 (static app)
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Structural checks
        run: |
          set -e
          fail=0
          for f in index.html decode-your-pattern_6.html; do
            if [ ! -s "$f" ]; then echo "::error::$f is missing or empty"; fail=1; continue; fi
            if ! grep -q "</html>" "$f"; then echo "::error::$f has no closing </html>"; fail=1; fi
            echo "✓ $f ($(wc -c < "$f") bytes)"
          done
          # required docs present
          for d in README.md LICENSE ROADMAP.md docs/ARCHITECTURE.md docs/CASE_STUDY.md; do
            if [ ! -s "$d" ]; then echo "::error::missing $d"; fail=1; else echo "✓ $d"; fi
          done
          exit $fail

      - name: HTML lint (informational)
        continue-on-error: true
        run: npx --yes html-validate index.html decode-your-pattern_6.html || true

  backend:
    name: Backend (Phase B — pytest)
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: phase-b/backend
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - name: Install dependencies
        run: pip install -r requirements.txt
      - name: Run tests
        run: pytest -q

